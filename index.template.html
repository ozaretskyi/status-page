<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ozaretskyi / starred</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --border-h:  #484f58;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --link:      #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --yellow:    #d29922;
    --purple:    #bc8cff;
    --orange:    #ffa657;
    --accent:    #1f6feb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(13,17,23,.92);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  header svg { flex-shrink: 0; }
  .header-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
  }
  .header-sep { color: var(--border-h); }
  .header-sub { color: var(--muted); font-size: 12px; }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #last-updated { color: var(--muted); font-size: 11px; }
  #refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: border-color .15s, background .15s;
  }
  #refresh-btn:hover { border-color: var(--border-h); background: #21262d; }

  /* ── Layout ── */
  main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill strong { color: var(--text); }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all .15s;
  }
  .filter-btn:hover { border-color: var(--border-h); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .search-box {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    width: 200px;
    outline: none;
    transition: border-color .15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* ── Repo list ── */
  .repo-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .repo-row {
    background: var(--surface);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: start;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    cursor: default;
  }
  .repo-row:last-child { border-bottom: none; }
  .repo-row:hover { background: #1c2128; }

  .repo-main {}
  .repo-name-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .repo-name {
    color: var(--link);
    font-weight: 700;
    font-size: 13px;
    text-decoration: none;
  }
  .repo-name:hover { text-decoration: underline; }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    border: 1px solid;
  }
  .badge-private  { color: var(--muted);  border-color: var(--border); }
  .badge-public   { color: var(--green);  border-color: #238636; }
  .badge-fork     { color: var(--purple); border-color: #6e40c9; }
  .badge-archived { color: var(--yellow); border-color: #9e6a03; }

  .repo-desc {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
    line-height: 1.5;
    max-width: 700px;
  }

  .repo-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--muted);
    font-size: 11px;
  }
  .lang-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ── Actions status (right column) ── */
  .repo-actions { text-align: right; min-width: 140px; }

  .run-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
    white-space: nowrap;
    text-decoration: none;
  }
  .run-status:hover { opacity: .85; }

  .status-success  { color: var(--green);  border-color: #238636; background: rgba(35,134,54,.1); }
  .status-failure  { color: var(--red);    border-color: #da3633; background: rgba(218,54,51,.1); }
  .status-in_progress, .status-queued, .status-waiting {
    color: var(--yellow); border-color: #9e6a03; background: rgba(158,106,3,.1);
  }
  .status-cancelled, .status-skipped, .status-neutral {
    color: var(--muted);  border-color: var(--border); background: transparent;
  }
  .status-none { color: var(--muted); border-color: var(--border); background: transparent; }

  .run-workflow { color: var(--muted); font-size: 10px; margin-top: 4px; }
  .run-time     { color: var(--muted); font-size: 10px; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Loading / Error states ── */
  .loading-state, .error-state {
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
  }
  .error-state { color: var(--red); }
  .big-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--link);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }

  /* ── Empty ── */
  .empty-row { padding: 40px; text-align: center; color: var(--muted); }

  @media (max-width: 600px) {
    .repo-row { grid-template-columns: 1fr; }
    .repo-actions { text-align: left; }
    .search-box { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <!-- GitHub octocat SVG -->
  <svg height="28" viewBox="0 0 16 16" width="28" fill="#e6edf3">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
      -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
      .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
      -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
      .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
      .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
      0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </svg>
  <a class="header-title" href="https://github.com/ozaretskyi" target="_blank">ozaretskyi</a>
  <span class="header-sep">/</span>
  <span class="header-sub">starred</span>
  <div class="header-right">
    <span id="last-updated"></span>
    <button id="refresh-btn">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="stats-bar" id="stats-bar"></div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="success">✅ Passing</button>
    <button class="filter-btn" data-filter="failure">❌ Failing</button>
    <button class="filter-btn" data-filter="in_progress">⏳ Running</button>
    <button class="filter-btn" data-filter="none">— No CI</button>
    <input class="search-box" id="search" type="text" placeholder="Search repos…" />
  </div>

  <div class="repo-list" id="repo-list">
    <div class="loading-state">
      <div class="big-spinner"></div>
      Loading repositories…
    </div>
  </div>
</main>

<script>
const TOKEN = '__GITHUB_TOKEN__';
const USER  = 'ozaretskyi';

const LANG_COLORS = {
  JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5',
  Java:'#b07219', Go:'#00ADD8', Rust:'#dea584', Shell:'#89e051',
  HTML:'#e34c26', CSS:'#563d7c', Ruby:'#701516', Kotlin:'#A97BFF',
  Dockerfile:'#384d54', HCL:'#844FBA', YAML:'#cb171e', Groovy:'#e69f56',
};

let allRepos = [];
let activeFilter = 'all';
let searchTerm = '';

const headers = {
  'Authorization': `Bearer ${TOKEN}`,
  'Accept': 'application/vnd.github+json',
  'X-GitHub-Api-Version': '2022-11-28',
};

async function fetchAllRepos() {
  let repos = [], page = 1;
  while (true) {
    const r = await fetch(
      `https://api.github.com/user/starred?per_page=100&page=${page}`,
      { headers }
    );
    if (!r.ok) throw new Error(`GitHub API error ${r.status}: ${await r.text()}`);
    const batch = await r.json();
    if (!batch.length) break;
    repos = repos.concat(batch);
    page++;
  }
  return repos.filter(r => r.owner?.login === USER);
}

async function fetchLatestRun(repo) {
  try {
    const r = await fetch(
      `https://api.github.com/repos/${USER}/${repo}/actions/runs?per_page=1`,
      { headers }
    );
    if (!r.ok) return null;
    const d = await r.json();
    return d.workflow_runs?.[0] ?? null;
  } catch { return null; }
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr);
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d}d ago`;
  return new Date(dateStr).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function statusIcon(conclusion, status) {
  if (status === 'in_progress' || status === 'queued' || status === 'waiting') return '⏳';
  if (conclusion === 'success')   return '✅';
  if (conclusion === 'failure')   return '❌';
  if (conclusion === 'cancelled') return '⊘';
  return '—';
}

function statusClass(conclusion, status) {
  if (!conclusion && !status) return 'status-none';
  if (status === 'in_progress' || status === 'queued' || status === 'waiting') return 'status-in_progress';
  return `status-${conclusion || 'none'}`;
}

function statusLabel(conclusion, status) {
  if (status === 'in_progress') return 'Running';
  if (status === 'queued')      return 'Queued';
  if (status === 'waiting')     return 'Waiting';
  if (conclusion === 'success') return 'Passing';
  if (conclusion === 'failure') return 'Failing';
  if (conclusion === 'cancelled') return 'Cancelled';
  if (conclusion === 'skipped') return 'Skipped';
  return 'No runs';
}

function filterKey(repo) {
  const run = repo._run;
  if (!run) return 'none';
  const s = run.status, c = run.conclusion;
  if (s === 'in_progress' || s === 'queued' || s === 'waiting') return 'in_progress';
  if (c === 'success') return 'success';
  if (c === 'failure') return 'failure';
  return 'none';
}

function renderStats() {
  const total   = allRepos.length;
  const passing = allRepos.filter(r => filterKey(r) === 'success').length;
  const failing = allRepos.filter(r => filterKey(r) === 'failure').length;
  const running = allRepos.filter(r => filterKey(r) === 'in_progress').length;
  const noci    = allRepos.filter(r => filterKey(r) === 'none').length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-pill">📦 <strong>${total}</strong> repos</div>
    <div class="stat-pill">✅ <strong>${passing}</strong> passing</div>
    <div class="stat-pill">❌ <strong>${failing}</strong> failing</div>
    ${running ? `<div class="stat-pill">⏳ <strong>${running}</strong> running</div>` : ''}
    <div class="stat-pill">— <strong>${noci}</strong> no CI</div>
  `;
}

function renderList() {
  const list = document.getElementById('repo-list');
  const filtered = allRepos.filter(repo => {
    const fk = filterKey(repo);
    const matchFilter = activeFilter === 'all' || fk === activeFilter;
    const matchSearch = !searchTerm ||
      repo.name.toLowerCase().includes(searchTerm) ||
      (repo.description || '').toLowerCase().includes(searchTerm);
    return matchFilter && matchSearch;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-row">No repositories match this filter.</div>`;
    return;
  }

  list.innerHTML = filtered.map(repo => {
    const run = repo._run;
    const conc = run?.conclusion ?? null;
    const stat = run?.status ?? null;
    const sc   = statusClass(conc, stat);
    const icon = statusIcon(conc, stat);
    const label = statusLabel(conc, stat);
    const runUrl = run?.html_url ?? `https://github.com/${USER}/${repo.name}/actions`;
    const langColor = LANG_COLORS[repo.language] || '#8b949e';

    const badges = [
      repo.private  ? '<span class="badge badge-private">private</span>'  : '<span class="badge badge-public">public</span>',
      repo.fork     ? '<span class="badge badge-fork">fork</span>'         : '',
      repo.archived ? '<span class="badge badge-archived">archived</span>': '',
    ].join('');

    return `
    <div class="repo-row">
      <div class="repo-main">
        <div class="repo-name-line">
          <a class="repo-name" href="https://github.com/${USER}/${repo.name}" target="_blank">${repo.name}</a>
          ${badges}
        </div>
        ${repo.description ? `<div class="repo-desc">${repo.description}</div>` : ''}
        <div class="repo-meta">
          ${repo.language ? `
            <span class="meta-item">
              <span class="lang-dot" style="background:${langColor}"></span>
              ${repo.language}
            </span>` : ''}
          ${repo.stargazers_count > 0 ? `<span class="meta-item">⭐ ${repo.stargazers_count}</span>` : ''}
          ${repo.forks_count > 0 ? `<span class="meta-item">🍴 ${repo.forks_count}</span>` : ''}
          <span class="meta-item">Updated ${timeAgo(repo.pushed_at)}</span>
        </div>
      </div>
      <div class="repo-actions">
        <a class="run-status ${sc}" href="${runUrl}" target="_blank">
          ${stat === 'in_progress' ? '<span class="spinner"></span>' : icon}
          ${label}
        </a>
        ${run ? `
          <div class="run-workflow">${run.name || run.event}</div>
          <div class="run-time">${timeAgo(run.updated_at)}</div>
        ` : ''}
      </div>
    </div>`;
  }).join('');
}

async function load() {
  document.getElementById('repo-list').innerHTML = `
    <div class="loading-state"><div class="big-spinner"></div>Fetching repositories…</div>`;

  try {
    const repos = await fetchAllRepos();

    // Fetch Actions runs in parallel (batched to avoid rate limits)
    const BATCH = 10;
    for (let i = 0; i < repos.length; i += BATCH) {
      const slice = repos.slice(i, i + BATCH);
      await Promise.all(slice.map(async r => {
        r._run = await fetchLatestRun(r.name);
      }));
    }

    // Sort: failing first, then running, then passing, then none
    const order = { failure:0, in_progress:1, success:2, none:3 };
    repos.sort((a, b) => (order[filterKey(a)] ?? 4) - (order[filterKey(b)] ?? 4));

    allRepos = repos;

    renderStats();
    renderList();

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById('repo-list').innerHTML = `
      <div class="error-state">⚠️ ${err.message}</div>`;
  }
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderList();
});

// Refresh
document.getElementById('refresh-btn').addEventListener('click', load);

load();
</script>
</body>
</html>
