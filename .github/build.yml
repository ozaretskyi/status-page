name: Build & Deploy Status Page

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual trigger
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject token & build index.html
        env:
          GH_PAT: ${{ secrets.STATUS_PAGE_TOKEN }}
        run: |
          sed "s/__GITHUB_TOKEN__/${GH_PAT}/g" index.template.html > index.html

      - name: Commit built index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: rebuild status page [skip ci]"
          git push
